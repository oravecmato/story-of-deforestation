name: CodeQL

# Static application security testing (SAST) via GitHub's native CodeQL engine. Runs on PRs, on
# pushes to main, and weekly (to catch newly-published query updates against unchanged code). Results
# surface in the repo's Security → Code scanning tab.
#
# NOTE: CodeQL code scanning is free for PUBLIC repositories. On a PRIVATE repo it requires GitHub
# Advanced Security — if this repo stays private, either make it public (it is a portfolio) or delete
# this workflow and rely on the deps + secret scans in ci-cd.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # Mondays 03:27 UTC

permissions:
  contents: read
  security-events: write # required to upload scanning results

jobs:
  analyze:
    name: Analyze · javascript-typescript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Run analysis
        uses: github/codeql-action/analyze@v3
